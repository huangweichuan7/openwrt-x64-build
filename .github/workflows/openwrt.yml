name: Build OpenWrt Bypass Advanced

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev rsync unzip \
            zlib1g-dev file wget python3

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt
          cd openwrt
          git checkout v23.05.5

      - name: Add third-party packages
        run: |
          cd openwrt/package
          git clone https://github.com/vernesong/OpenClash.git
          git clone https://github.com/xiaorouji/openwrt-passwall.git
          git clone https://github.com/xiaorouji/openwrt-passwall-packages.git
          git clone https://github.com/fullcone-nat-nftables/nft-fullcone.git

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom config
        run: |
          cp config/x64-bypass.config openwrt/.config

      - name: Configure
        run: |
          cd openwrt
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j4

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x64-bypass-advanced
          path: openwrt/bin/targets/x86/64
