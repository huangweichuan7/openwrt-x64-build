name: Build OpenWrt x64 Advanced

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev rsync unzip \
            zlib1g-dev file wget python3

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt
          cd openwrt

      - name: Add packages
        run: |
          cd openwrt/package
          git clone --depth 1 https://github.com/vernesong/OpenClash.git
          git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall2.git
          git clone --depth 1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git
          git clone --depth 1 https://github.com/pymumu/luci-app-smartdns.git
          git clone --depth 1 https://github.com/pymumu/smartdns.git

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp config/x64.config openwrt/.config

      - name: Defconfig
        run: |
          cd openwrt
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make defconfig
          make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x64-advanced
          path: openwrt/bin/targets/x86/64
